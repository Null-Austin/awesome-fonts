<!DOCTYPE html>
<html lang="en">
<head>
    <script>
        window.addEventListener("error", function (event) {
            alert(
            "Error: " + event.message +
            "\nURL: " + event.filename +
            "\nLine: " + event.lineno +
            "\nColumn: " + event.colno +
            "\nStackTrace: " + (event.error && event.error.stack ? event.error.stack : "No stack trace available")
            );
        });
        window.onerror = function (msg, url, lineNo, columnNo, error) {
            const stack = error && error.stack ? error.stack : "No stack trace available";
            alert(
            "Error: " + msg +
            "\nURL: " + url +
            "\nLine: " + lineNo +
            "\nColumn: " + columnNo +
            "\nStackTrace: " + stack
            );
            return false;
        };

        window.addEventListener("unhandledrejection", function (event) {
            const reason = event.reason && event.reason.stack ? event.reason.stack : String(event.reason);
            alert("Unhandled Promise Rejection:\n" + reason);
        });
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
